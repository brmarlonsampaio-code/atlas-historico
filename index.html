<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas Atlantes – Atlas Histórico Digital</title>

  <!-- Maplibre GL -->
  <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    /* ===== RESET ===== */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #202124; height: 100vh; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ===== HEADER ===== */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 20px; height: 60px; background: #fff; border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0; z-index: 10;
    }
    .header-logo { font-weight: 800; font-size: 1.3rem; color: #1a73e8; text-decoration: none; display: flex; align-items: center; gap: 10px; }
    .header-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid #d0d0d0;
      background: #f8f9fa; color: #202124; font-size: 0.8rem; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s;
    }
    .btn:hover { background: #e8eaed; border-color: #1a73e8; color: #1a73e8; }
    .btn-success { background: #27ae60; color: #fff; border-color: #27ae60; }
    .btn-success:hover { background: #2ecc71; border-color: #2ecc71; color: #fff; }

    .search-wrapper { position: relative; }
    .search-wrapper i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #777; font-size: 0.8rem; }
    #searchInput {
      padding: 6px 12px 6px 30px; border-radius: 20px; border: 1px solid #d0d0d0;
      background: #f8f9fa; width: 200px; font-size: 0.8rem; transition: 0.3s;
    }
    #searchInput:focus { outline: none; width: 260px; border-color: #1a73e8; background: #fff; box-shadow: 0 0 0 3px rgba(26,115,232,0.15); }

    /* ===== MAPA ===== */
    .main-area { display: flex; flex: 1; overflow: hidden; position: relative; }
    #map-container { flex: 1; height: 100%; position: relative; background: #e8eaed; }
    #map { width: 100%; height: 100%; min-height: 400px; }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width: 280px; background: #fff; border-right: 1px solid #e0e0e0;
      padding: 16px; overflow-y: auto; transition: 0.3s; flex-shrink: 0;
    }
    #sidebar.collapsed { width: 0; padding: 0; border: none; opacity: 0; pointer-events: none; }
    .sidebar-title { font-weight: 600; color: #1a73e8; border-bottom: 1px solid #e0e0e0; padding-bottom: 6px; margin-bottom: 12px; display: flex; justify-content: space-between; }
    .filter-group { margin-bottom: 12px; }
    .filter-header { display: flex; justify-content: space-between; cursor: pointer; padding: 4px 0; font-weight: 500; font-size: 0.85rem; }
    .filter-content { padding-left: 8px; display: flex; flex-direction: column; gap: 4px; }
    .filter-btn {
      display: flex; align-items: center; gap: 6px; padding: 4px 8px; border: none;
      background: transparent; color: #5f6368; font-size: 0.8rem; cursor: pointer;
      border-radius: 4px; transition: 0.2s; width: 100%; text-align: left;
    }
    .filter-btn:hover { background: #f1f3f4; }
    .filter-btn.active { background: #e8f0fe; color: #1a73e8; font-weight: 500; }
    .filter-btn .count { margin-left: auto; background: #e8eaed; padding: 0 8px; border-radius: 10px; font-size: 0.65rem; }

    .range-row { display: flex; gap: 8px; align-items: center; font-size: 0.8rem; margin-top: 6px; }
    .range-row input { width: 80px; padding: 4px 6px; border: 1px solid #d0d0d0; border-radius: 4px; text-align: center; }
    #count-visible { color: #1a73e8; font-weight: 700; }

    /* ===== TIMELINE ===== */
    .timeline-section {
      position: absolute; bottom: 20px; left: 20px; right: 20px; height: 180px;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
      border-radius: 12px; padding: 10px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.08);
      transition: 0.4s; z-index: 4;
    }
    .timeline-section.collapsed { transform: translateY(220px); opacity: 0; pointer-events: none; }
    .timeline-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #1a73e8; border-bottom: 1px solid #e0e0e0; padding-bottom: 4px; margin-bottom: 8px; }
    .timeline-wrapper { overflow-x: auto; height: calc(100% - 30px); display: flex; align-items: center; gap: 12px; padding-bottom: 4px; }
    .timeline-wrapper::-webkit-scrollbar { height: 4px; }
    .timeline-wrapper::-webkit-scrollbar-thumb { background: #1a73e8; border-radius: 4px; }
    .event-card {
      min-width: 180px; height: 90px; background: #fff; border-radius: 8px;
      border-left: 4px solid var(--card-color, #1a73e8);
      box-shadow: 0 2px 6px rgba(0,0,0,0.06); display: flex; overflow: hidden;
      cursor: pointer; transition: 0.2s; flex-shrink: 0;
    }
    .event-card:hover { transform: translateY(-4px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
    .event-card.highlight { border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.25); }
    .event-cover { width: 60px; height: 100%; object-fit: cover; flex-shrink: 0; }
    .event-info { padding: 6px 10px; display: flex; flex-direction: column; justify-content: space-between; flex: 1; overflow: hidden; }
    .event-date { font-size: 0.6rem; color: #1a73e8; font-weight: 600; }
    .event-title { font-size: 0.75rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-desc { font-size: 0.6rem; color: #5f6368; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* ===== DETAIL PANEL ===== */
    #detail-panel {
      position: absolute; top: 0; right: 0; bottom: 0; width: 400px;
      background: #fff; border-left: 1px solid #e0e0e0;
      transform: translateX(100%); transition: 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: 15; display: flex; flex-direction: column; box-shadow: -4px 0 20px rgba(0,0,0,0.08);
    }
    #detail-panel.open { transform: translateX(0); }
    .panel-cover { height: 140px; background: #e8eaed; position: relative; overflow: hidden; }
    .panel-cover img { width: 100%; height: 100%; object-fit: cover; }
    .panel-cover .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.4)); }
    .panel-close { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; border-radius: 50%; background: rgba(0,0,0,0.5); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .panel-close:hover { background: #1a73e8; }
    .panel-tabs { display: flex; background: #f8f9fa; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
    .panel-tabs button { flex: 1; padding: 8px 4px; border: none; background: transparent; font-size: 0.7rem; font-weight: 500; color: #5f6368; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; }
    .panel-tabs button.active { color: #1a73e8; border-bottom-color: #1a73e8; }
    .panel-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .panel-body .tab-content { display: none; flex-direction: column; gap: 12px; }
    .panel-body .tab-content.active { display: flex; }
    .panel-title { font-size: 1.2rem; font-weight: 700; }
    .panel-sub { color: #5f6368; font-size: 0.85rem; }
    .panel-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; background: #f8f9fa; padding: 10px; border-radius: 6px; }
    .panel-meta .label { font-size: 0.6rem; text-transform: uppercase; color: #5f6368; }
    .panel-meta .value { font-weight: 500; }
    .panel-desc { font-size: 0.85rem; line-height: 1.5; text-align: justify; }

    /* ===== LOADING ===== */
    #loading-overlay {
      position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999; transition: 0.6s;
    }
    #loading-overlay.hide { opacity: 0; pointer-events: none; }
    .spinner { width: 50px; height: 50px; border: 4px solid #e0e0e0; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== MARKERS ===== */
    .marker-container { width: 30px; height: 30px; position: relative; cursor: pointer; }
    .marker-pin {
      width: 16px; height: 16px; border-radius: 50% 50% 50% 0;
      background: var(--marker-color, #1a73e8);
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%) rotate(-45deg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .marker-pin::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .marker-pulse {
      width: 30px; height: 30px; border-radius: 50%; background: var(--marker-color, #1a73e8);
      opacity: 0.15; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.4; } 100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; } }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      z-index: 999; display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff; border-radius: 16px; padding: 24px;
      max-width: 640px; width: 90%; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e0e0e0; padding-bottom: 12px; margin-bottom: 16px; }
    .modal-header h3 { color: #1a73e8; }
    .modal-close { cursor: pointer; font-size: 1.4rem; color: #5f6368; }
    .modal-close:hover { color: #202124; }
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: 0.7rem; text-transform: uppercase; color: #5f6368; font-weight: 600; display: block; margin-bottom: 2px; }
    .form-control { width: 100%; padding: 8px 12px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 0.85rem; }
    .form-control:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .btn-submit { width: 100%; padding: 12px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-submit:hover { background: #1557b0; }

    @media (max-width: 768px) {
      .header { flex-wrap: wrap; height: auto; padding: 8px 12px; gap: 6px; }
      .header-logo { font-size: 1rem; }
      #searchInput { width: 120px; }
      #searchInput:focus { width: 160px; }
      #sidebar { width: 220px; }
      #detail-panel { width: 100%; }
      .timeline-section { height: 150px; bottom: 10px; left: 10px; right: 10px; }
      .event-card { min-width: 140px; height: 70px; }
      .form-row { grid-template-columns: 1fr; }
      .form-row-3 { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- LOADING -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p style="margin-top:20px; font-weight:500; color:#1a73e8;">Carregando Atlas...</p>
  </div>

  <div id="app">
    <header class="header">
      <a href="#" class="header-logo" id="logoReset"><i class="fa-solid fa-compass"></i> Atlas Atlantes</a>
      <div class="header-controls">
        <div class="search-wrapper">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="searchInput" placeholder="Buscar..." />
        </div>
        <button class="btn" id="btnToggleFilters"><i class="fa-solid fa-filter"></i> Filtros</button>
        <button class="btn" id="btnToggleTimeline"><i class="fa-solid fa-timeline"></i> Linha do Tempo</button>
        <button class="btn btn-success" id="btnAddRoute"><i class="fa-solid fa-route"></i> Nova Rota</button>
      </div>
    </header>

    <div class="main-area">
      <aside id="sidebar">
        <div class="sidebar-title"><span>Período</span> <i class="fa-regular fa-calendar"></i></div>
        <div class="range-row">
          <input type="number" id="inputStartYear" value="-2000" />
          <span>até</span>
          <input type="number" id="inputEndYear" value="2026" />
        </div>

        <div class="sidebar-title" style="margin-top:16px;"><span>Filtros</span> <i class="fa-solid fa-sliders"></i></div>

        <div class="filter-group">
          <div class="filter-header" data-target="cat">Categoria <i class="fa-solid fa-chevron-down"></i></div>
          <div class="filter-content" id="categoria-filtros"></div>
        </div>
        <div class="filter-group">
          <div class="filter-header" data-target="tema">Tema <i class="fa-solid fa-chevron-down"></i></div>
          <div class="filter-content" id="tema-filtros"></div>
        </div>
        <div class="filter-group">
          <div class="filter-header" data-target="povo">Cultura <i class="fa-solid fa-chevron-down"></i></div>
          <div class="filter-content" id="povo-filtros"></div>
        </div>

        <button class="btn" style="width:100%; justify-content:center; margin-top:12px;" id="reset-filtros">
          <i class="fa-solid fa-rotate-left"></i> Limpar Filtros
        </button>

        <div style="margin-top:20px; border-top:1px solid #e0e0e0; padding-top:12px; font-size:0.8rem; color:#5f6368; display:flex; justify-content:space-between;">
          <span>Registros:</span> <strong id="count-visible">0</strong>
        </div>
      </aside>

      <div id="map-container">
        <div id="map"></div>

        <div class="timeline-section" id="timelineSection">
          <div class="timeline-header">
            <span><i class="fa-regular fa-clock"></i> Linha do Tempo</span>
            <button class="btn" id="timelineCloseBtn" style="font-size:0.7rem; padding:2px 10px;">Ocultar</button>
          </div>
          <div class="timeline-wrapper">
            <div id="timelineContainer" style="display:flex; gap:12px; height:100%; align-items:center;"></div>
          </div>
        </div>
      </div>

      <aside id="detail-panel">
        <div class="panel-cover">
          <img id="detailCover" src="" alt="capa" />
          <div class="overlay"></div>
          <button class="panel-close" id="btnCloseDetail"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="panel-tabs">
          <button class="active" data-tab="tab-narrativa">Narrativa</button>
          <button data-tab="tab-multimidia">Mídia</button>
          <button data-tab="tab-documentos">Documentos</button>
        </div>
        <div class="panel-body">
          <div class="tab-content active" id="tab-narrativa">
            <span class="panel-category-badge" id="detailCategoryBadge" style="background:#e8eaed; padding:2px 10px; border-radius:12px; font-size:0.7rem;">Categoria</span>
            <h2 class="panel-title" id="detailTitle">Título</h2>
            <div class="panel-sub" id="detailSubtitle">Subtítulo</div>
            <div class="panel-meta">
              <div><div class="label">Ano</div><div class="value" id="detailMetaDate">-</div></div>
              <div><div class="label">Local</div><div class="value" id="detailMetaLocation">-</div></div>
              <div><div class="label">Coordenadas</div><div class="value" id="detailMetaCoords">-</div></div>
              <div><div class="label">Cultura</div><div class="value" id="detailMetaPovo">-</div></div>
            </div>
            <p class="panel-desc" id="detailDescription">Descrição</p>
          </div>
          <div class="tab-content" id="tab-multimidia">
            <h4>Galeria</h4>
            <div id="detailGallery" style="display:grid; grid-template-columns:repeat(4,1fr); gap:6px;"></div>
          </div>
          <div class="tab-content" id="tab-documentos">
            <h4>Documentos</h4>
            <div id="detailDocuments"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- MODAL NOVA ROTA -->
  <div class="modal-overlay" id="modalAddRoute">
    <div class="modal-box">
      <div class="modal-header">
        <h3><i class="fa-solid fa-route" style="color:#1a73e8;"></i> Nova Rota</h3>
        <span class="modal-close" id="btnCloseAddRoute"><i class="fa-solid fa-xmark"></i></span>
      </div>
      <form id="addRouteForm">
        <div class="form-row">
          <div class="form-group"><label>Nome *</label><input type="text" id="routeName" class="form-control" placeholder="Ex: Rota do Cabo" required /></div>
          <div class="form-group"><label>Subtítulo</label><input type="text" id="routeSubtitle" class="form-control" placeholder="Breve descrição" /></div>
        </div>
        <div class="form-row-3">
          <div class="form-group"><label>Ano *</label><input type="number" id="routeYear" class="form-control" placeholder="1500" required /></div>
          <div class="form-group"><label>Cor</label><input type="color" id="routeColor" class="form-control" value="#d4af37" style="padding:2px; height:38px;" /></div>
          <div class="form-group"><label>Tema</label><select id="routeCategory" class="form-control"><option>Comércio</option><option>Cultura</option><option>Política</option><option>Religião</option></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Países</label><input type="text" id="routeCountries" class="form-control" placeholder="Ex: Portugal/Brasil" /></div>
          <div class="form-group"><label>Continentes</label><input type="text" id="routeContinents" class="form-control" placeholder="Ex: Europa/América" /></div>
        </div>
        <div class="form-group">
          <label>Pontos da Rota (clique no mapa)</label>
          <div style="display:flex; gap:6px; flex-wrap:wrap;">
            <input type="number" step="any" id="routePointLat" class="form-control" placeholder="Lat" style="flex:1; min-width:70px;" />
            <input type="number" step="any" id="routePointLon" class="form-control" placeholder="Lon" style="flex:1; min-width:70px;" />
            <button type="button" class="btn" id="btnAddRoutePoint"><i class="fa-solid fa-plus"></i> Adicionar</button>
          </div>
          <div style="font-size:0.7rem; color:#5f6368; margin-top:4px;">💡 Clique no mapa para preencher as coordenadas</div>
        </div>
        <div id="routePointsList" style="max-height:100px; overflow-y:auto; background:#f8f9fa; border-radius:6px; padding:4px; border:1px solid #e0e0e0; margin-bottom:10px;">
          <div style="text-align:center; color:#777; font-size:0.8rem; padding:6px;">Nenhum ponto</div>
        </div>
        <div class="form-group"><label>Descrição *</label><textarea id="routeDescription" class="form-control" rows="3" placeholder="Descreva a rota..." required></textarea></div>
        <button type="submit" class="btn-submit"><i class="fa-solid fa-route"></i> Adicionar Rota</button>
      </form>
    </div>
  </div>

  <script>
    // =========================================================
    // DADOS COMPLETOS E CORRETOS (TODOS OS PORTOS + ROTAS)
    // =========================================================
    const CORES_CATEGORIA = { mapa: '#1a73e8', porto: '#0d9488', rota: '#d4af37' };
    const NOMES_CATEGORIA = { mapa: 'Mapa', porto: 'Porto', rota: 'Rota Comercial' };

    const DADOS_INICIAIS = [
      // ======== MAPAS HISTÓRICOS ========

        nome: "Carta de Piri Reis (1513)",

        fundacao: 1502,
        descricao: "O mais antigo mapa a retratar a costa do Brasil.",
        coverImage: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d1/Cantino_Planisphere_%281502%29.jpg/400px-Cantino_Planisphere_%281502%29.jpg",

      },

      // ======== PORTOS - AMÉRICA DO NORTE ========
      {
        nome: "Veracruz (México)",
        subtitulo: "O porto mais antigo do México continental",
        lat: 19.2029, lon: -96.1382,
        pais: "México", continente: "América do Norte",
        categoria: "porto", tema: "Colonização", povo: "Espanhóis e Nahuas",
        fundacao: 1519,
        descricao: "Fundado por Hernán Cortés em 1519, foi a principal porta de entrada de mercadorias e escravizados durante o período colonial.",

      {
        nome: "Havana (Cuba)",
        subtitulo: "O coração do império espanhol no Caribe",
        lat: 23.1136, lon: -82.3666,
        pais: "Cuba", continente: "América do Norte",

    // =========================================================
    // APLICAÇÃO PRINCIPAL
    // =========================================================
    class AtlasApp {
      constructor() {
        this.data = [];
        this.map = null;
        this.markers = [];
        this.markerData = [];
        this.routeLayers = [];
        this.routePointMarkers = [];
        this.activeFilters = { categoria: 'todos', tema: 'todos', povo: 'todos' };
        this.searchQuery = '';
        this.startYear = -2000;
        this.endYear = 2026;
        this.routePoints = [];
        this._pending = false;
      }

      async start() {
        this.initDOM();
        await this.carregarDados();
        this.inicializarMapa();
        this.inicializarFiltros();
        this.bindEventos();
        this.aplicarFiltros();
        setTimeout(() => {
          document.getElementById('loading-overlay').classList.add('hide');
        }, 800);
      }

      initDOM() {
        this.$ = id => document.getElementById(id);
        this.dom = {
          map: this.$('map'),
          sidebar: this.$('sidebar'),
          categoria: this.$('categoria-filtros'),
          tema: this.$('tema-filtros'),
          povo: this.$('povo-filtros'),
          search: this.$('searchInput'),
          count: this.$('count-visible'),
          timeline: this.$('timelineContainer'),
          timelineSection: this.$('timelineSection'),
          timelineClose: this.$('timelineCloseBtn'),
          detailPanel: this.$('detail-panel'),
          detailCover: this.$('detailCover'),
          detailCategory: this.$('detailCategoryBadge'),
          detailTitle: this.$('detailTitle'),
          detailSubtitle: this.$('detailSubtitle'),
          detailMetaDate: this.$('detailMetaDate'),
          detailMetaLocation: this.$('detailMetaLocation'),
          detailMetaCoords: this.$('detailMetaCoords'),
          detailMetaPovo: this.$('detailMetaPovo'),
          detailDescription: this.$('detailDescription'),
          detailGallery: this.$('detailGallery'),
          detailDocuments: this.$('detailDocuments'),
          btnCloseDetail: this.$('btnCloseDetail'),
          btnToggleFilters: this.$('btnToggleFilters'),
          btnToggleTimeline: this.$('btnToggleTimeline'),
          btnResetFilters: this.$('reset-filtros'),
          inputStart: this.$('inputStartYear'),
          inputEnd: this.$('inputEndYear'),
          logoReset: this.$('logoReset'),
          modalAddRoute: this.$('modalAddRoute'),
          btnCloseAddRoute: this.$('btnCloseAddRoute'),
          btnAddRoute: this.$('btnAddRoute'),
          addRouteForm: this.$('addRouteForm'),
          routeName: this.$('routeName'),
          routeSubtitle: this.$('routeSubtitle'),
          routeYear: this.$('routeYear'),
          routeColor: this.$('routeColor'),
          routeCategory: this.$('routeCategory'),
          routeCountries: this.$('routeCountries'),
          routeContinents: this.$('routeContinents'),
          routePointLat: this.$('routePointLat'),
          routePointLon: this.$('routePointLon'),
          btnAddRoutePoint: this.$('btnAddRoutePoint'),
          routePointsList: this.$('routePointsList'),
          routeDescription: this.$('routeDescription')
        };
      }

      async carregarDados() {
        const stored = localStorage.getItem('atlas_data_completo');
        if (stored) {
          this.data = JSON.parse(stored);
          console.log('✅ Carregado do localStorage:', this.data.length);
          return;
        }
        this.data = JSON.parse(JSON.stringify(DADOS_INICIAIS));
        localStorage.setItem('atlas_data_completo', JSON.stringify(this.data));
        console.log('✅ Dados iniciais:', this.data.length);
      }

      salvarDados() {
        localStorage.setItem('atlas_data_completo', JSON.stringify(this.data));
      }

      // =========================================================
      // MAPA
      // =========================================================
      inicializarMapa() {
        const style = {
          version: 8,
          sources: {
            'osm': {
              type: 'raster',
              tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
              tileSize: 256,
              attribution: '© OpenStreetMap'
            }
          },
          layers: [{
            id: 'osm-layer',
            type: 'raster',
            source: 'osm',
            minzoom: 0,
            maxzoom: 19
          }]
        };

        this.map = new maplibregl.Map({
          container: 'map',
          style: style,
          center: [-10, 10],
          zoom: 2.0,
          pitch: 0
        });

        this.map.on('load', () => {
          console.log('✅ Mapa carregado');
          this.map.resize();
          this.desenharRotas();
        });

        setTimeout(() => {
          if (this.map && !this.map.loaded()) {
            console.warn('⏳ Mapa demorou, forçando redesenho...');
            this.desenharRotas();
          }
        }, 4000);

        this.map.on('click', (e) => {
          if (this.dom.modalAddRoute.classList.contains('open')) {
            const { lng, lat } = e.lngLat;
            this.dom.routePointLat.value = lat.toFixed(6);
            this.dom.routePointLon.value = lng.toFixed(6);
          }
        });
      }

      // =========================================================
      // ROTAS
      // =========================================================
      desenharRotas() {
        if (!this.map || !this.map.loaded()) {
          if (!this._pending) {
            this._pending = true;
            this.map.once('load', () => {
              this._pending = false;
              this.desenharRotas();
            });
          }
          return;
        }

        if (this.routeLayers.length) {
          this.routeLayers.forEach(id => {
            try {
              if (this.map.getLayer(id)) this.map.removeLayer(id);
              if (this.map.getSource(id)) this.map.removeSource(id);
            } catch(e) {}
          });
          this.routeLayers = [];
        }
        this.routePointMarkers.forEach(m => m.remove());
        this.routePointMarkers = [];

        const rotas = this.data.filter(d => d.tipo === 'rota' && d.pontos && d.pontos.length >= 2);
        if (!rotas.length) return;

        rotas.forEach((rota, idx) => {
          const id = 'rota-' + idx;
          const coords = rota.pontos.map(p => [p.lon, p.lat]);

          try {
            this.map.addSource(id, {
              type: 'geojson',
              data: {
                type: 'Feature',
                geometry: { type: 'LineString', coordinates: coords }
              }
            });

            this.map.addLayer({
              id: id + '-line',
              type: 'line',
              source: id,
              layout: { 'line-join': 'round', 'line-cap': 'round' },
              paint: {
                'line-color': rota.cor || '#d4af37',
                'line-width': 3,
                'line-dasharray': [6, 4],
                'line-opacity': 0.85
              }
            });
            this.map.addLayer({
              id: id + '-glow',
              type: 'line',
              source: id,
              layout: { 'line-join': 'round', 'line-cap': 'round' },
              paint: {
                'line-color': rota.cor || '#d4af37',
                'line-width': 7,
                'line-dasharray': [6, 4],
                'line-opacity': 0.15
              }
            });
            this.routeLayers.push(id + '-line', id + '-glow');

            rota.pontos.forEach(p => {
              const el = document.createElement('div');
              el.style.cssText = `
                width:10px; height:10px; border-radius:50%;
                background:${rota.cor || '#d4af37'};
                border:2px solid white;
                box-shadow:0 0 10px rgba(0,0,0,0.3);
              `;
              const marker = new maplibregl.Marker({ element: el })
                .setLngLat([p.lon, p.lat])
                .addTo(this.map);
              this.routePointMarkers.push(marker);
            });
          } catch(e) {
            console.warn('Erro ao desenhar rota:', e);
          }
        });
      }

      redesenharRotas() {
        if (this.map && this.map.loaded()) {
          this.desenharRotas();
        } else {
          this.map.once('load', () => this.desenharRotas());
        }
      }

      // =========================================================
      // MARCADORES FIXOS
      // =========================================================
      renderizarMarcadores(itens) {
        const newIds = itens.map(i => i.nome).sort().join(',');
        const oldIds = this.markerData.map(i => i.nome).sort().join(',');
        if (newIds === oldIds && this.markers.length > 0) return;

        this.markers.forEach(m => m.remove());
        this.markers = [];
        this.markerData = itens.slice();

        itens.forEach(item => {
          if (item.tipo === 'rota' || !item.lat || !item.lon) return;
          const cor = CORES_CATEGORIA[item.categoria] || '#1a73e8';

          const el = document.createElement('div');
          el.className = 'marker-container';
          el.style.setProperty('--marker-color', cor);

          const pulse = document.createElement('div');
          pulse.className = 'marker-pulse';
          const pin = document.createElement('div');
          pin.className = 'marker-pin';
          el.append(pulse, pin);

          const popup = new maplibregl.Popup({ offset: 15, closeButton: true })
            .setHTML(`
              <div style="padding:4px; font-family:sans-serif;">
                <strong style="color:#1a73e8;">${item.nome}</strong>
                <p style="font-size:0.75rem; color:#5f6368;">${item.subtitulo || ''}</p>
                <button onclick="window.atlasApp.abrirDetalhes('${item.nome.replace(/'/g, "\\'")}')"
                  style="margin-top:6px; background:#1a73e8; border:none; border-radius:4px; color:#fff; padding:4px 8px; font-size:0.7rem; cursor:pointer; width:100%;">
                  <i class="fa-regular fa-circle-info"></i> Detalhes
                </button>
              </div>
            `);

          const marker = new maplibregl.Marker({ element: el })
            .setLngLat([item.lon, item.lat])
            .setPopup(popup)
            .addTo(this.map);
          this.markers.push(marker);
        });
      }

      // =========================================================
      // FILTROS
      // =========================================================
      inicializarFiltros() {
        const cats = ['todos', ...new Set(this.data.map(d => d.categoria).filter(Boolean))];
        const temas = ['todos', ...new Set(this.data.map(d => d.tema).filter(Boolean))];
        const povos = ['todos', ...new Set(this.data.map(d => d.povo).filter(Boolean))];

        const render = (container, arr, key) => {
          container.innerHTML = arr.map(val => {
            const label = val === 'todos' ? 'Todos' : (NOMES_CATEGORIA[val] || val);
            return `<button class="filter-btn ${val==='todos'?'active':''}" data-key="${key}" data-val="${val}">
              <span>${label}</span>
              <span class="count">0</span>
            </button>`;
          }).join('');
        };
        render(this.dom.categoria, cats, 'categoria');
        render(this.dom.tema, temas, 'tema');
        render(this.dom.povo, povos, 'povo');
      }

      atualizarContadores(filtrados) {
        this.dom.count.textContent = filtrados.length;
        document.querySelectorAll('.filter-content').forEach(group => {
          group.querySelectorAll('.filter-btn').forEach(btn => {
            const key = btn.dataset.key;
            const val = btn.dataset.val;
            const count = val === 'todos' ? this.data.length : this.data.filter(d => d[key] === val).length;
            btn.querySelector('.count').textContent = count;
          });
        });
      }

      aplicarFiltros() {
        let filtrados = this.data.filter(item => {
          const matchCat = this.activeFilters.categoria === 'todos' || item.categoria === this.activeFilters.categoria;
          const matchTema = this.activeFilters.tema === 'todos' || item.tema === this.activeFilters.tema;
          const matchPovo = this.activeFilters.povo === 'todos' || item.povo === this.activeFilters.povo;
          const matchAno = item.fundacao >= this.startYear && item.fundacao <= this.endYear;
          return matchCat && matchTema && matchPovo && matchAno;
        });

        if (this.searchQuery) {
          const q = this.searchQuery.toLowerCase();
          filtrados = filtrados.filter(d =>
            d.nome?.toLowerCase().includes(q) ||
            d.subtitulo?.toLowerCase().includes(q) ||
            d.descricao?.toLowerCase().includes(q) ||
            d.povo?.toLowerCase().includes(q) ||
            d.pais?.toLowerCase().includes(q)
          );
        }

        this.renderizarMarcadores(filtrados);
        this.renderizarTimeline(filtrados);
        this.atualizarContadores(filtrados);
        this.redesenharRotas();
      }

      // =========================================================
      // TIMELINE
      // =========================================================
      renderizarTimeline(itens) {
        if (!itens.length) {
          this.dom.timeline.innerHTML = '<div style="color:#777; padding:10px;">Nenhum registro</div>';
          return;
        }
        this.dom.timeline.innerHTML = itens.map(item => {
          const cor = CORES_CATEGORIA[item.categoria] || '#1a73e8';
          const cover = item.coverImage || 'https://via.placeholder.com/80x80?text=No+Image';
          const ano = item.fundacao < 0 ? `${Math.abs(item.fundacao)} A.C.` : `${item.fundacao} D.C.`;
          const icon = item.tipo === 'rota' ? '🚢 ' : '';
          return `
            <div class="event-card" data-nome="${item.nome}" style="--card-color:${cor}" onclick="window.atlasApp.focarPonto('${item.nome.replace(/'/g, "\\'")}')">
              <img class="event-cover" src="${cover}" alt="${item.nome}" />
              <div class="event-info">
                <div class="event-date">${ano}</div>
                <div class="event-title">${icon}${item.nome}</div>
                <div class="event-desc">${(item.descricao||'').substring(0,60)}${(item.descricao||'').length>60?'...':''}</div>
              </div>
            </div>
          `;
        }).join('');
      }

      // =========================================================
      // NAVEGAÇÃO
      // =========================================================
      focarPonto(nome) {
        const item = this.data.find(d => d.nome === nome);
        if (!item) return;

        if (item.tipo === 'rota' && item.pontos?.length) {
          const centro = item.pontos[0];
          this.map.flyTo({ center: [centro.lon, centro.lat], zoom: 4.5, duration: 1800 });
        } else {
          this.map.flyTo({ center: [item.lon, item.lat], zoom: 6, duration: 1800 });
        }

        document.querySelectorAll('.event-card').forEach(c => c.classList.remove('highlight'));
        const card = document.querySelector(`.event-card[data-nome="${nome}"]`);
        if (card) {
          card.classList.add('highlight');
          card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
        this.abrirDetalhes(nome);
      }

      abrirDetalhes(nome) {
        const item = this.data.find(d => d.nome === nome);
        if (!item) return;
        this.dom.detailPanel.classList.add('open');

        this.dom.detailCover.src = item.coverImage || '';
        this.dom.detailTitle.textContent = item.nome;
        this.dom.detailSubtitle.textContent = item.subtitulo || '';
        this.dom.detailCategory.textContent = NOMES_CATEGORIA[item.categoria] || item.categoria;
        this.dom.detailCategory.style.borderColor = CORES_CATEGORIA[item.categoria] || '#1a73e8';
        this.dom.detailCategory.style.color = CORES_CATEGORIA[item.categoria] || '#1a73e8';

        const ano = item.fundacao < 0 ? `${Math.abs(item.fundacao)} A.C.` : `${item.fundacao} D.C.`;
        this.dom.detailMetaDate.textContent = ano;
        this.dom.detailMetaLocation.textContent = `${item.pais || ''}${item.continente ? ', '+item.continente : ''}`;
        this.dom.detailMetaCoords.textContent = item.tipo === 'rota' ? `${item.pontos?.length||0} pontos` : `${item.lat?.toFixed(4)||''}°, ${item.lon?.toFixed(4)||''}°`;
        this.dom.detailMetaPovo.textContent = item.povo || 'Desconhecido';
        this.dom.detailDescription.textContent = item.descricao || '';

        this.dom.detailGallery.innerHTML = (item.fotos||[]).map(f =>
          `<div style="aspect-ratio:1; background:#e8eaed; border-radius:4px; overflow:hidden; cursor:pointer;" onclick="window.atlasApp.abrirLightbox('${f.url}')">
            <img src="${f.url}" style="width:100%; height:100%; object-fit:cover;" />
          </div>`
        ).join('');

        this.dom.detailDocuments.innerHTML = (item.documentos||[]).map(d =>
          `<div style="display:flex; align-items:center; gap:8px; padding:6px 10px; background:#f8f9fa; border-radius:4px; border:1px solid #e0e0e0;">
            <i class="fa-regular fa-file-pdf" style="color:#1a73e8;"></i>
            <span style="flex:1; font-size:0.8rem;">${d.titulo}</span>
            <button class="btn" style="padding:2px 8px; font-size:0.7rem;" onclick="window.atlasApp.abrirPDF('${d.url}','${d.titulo}')">Ver</button>
          </div>`
        ).join('');

        document.querySelectorAll('.panel-tabs button').forEach(b => b.classList.remove('active'));
        document.querySelector('.panel-tabs button[data-tab="tab-narrativa"]').classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-narrativa').classList.add('active');
      }

      // =========================================================
      // ADICIONAR ROTA
      // =========================================================
      adicionarPontoRota() {
        const lat = parseFloat(this.dom.routePointLat.value);
        const lon = parseFloat(this.dom.routePointLon.value);
        if (isNaN(lat) || isNaN(lon)) { alert('Coordenadas inválidas'); return; }
        this.routePoints.push({ lat, lon });
        this.renderizarPontosRota();
        this.dom.routePointLat.value = '';
        this.dom.routePointLon.value = '';
      }

      removerPontoRota(idx) {
        this.routePoints.splice(idx, 1);
        this.renderizarPontosRota();
      }

      renderizarPontosRota() {
        if (!this.routePoints.length) {
          this.dom.routePointsList.innerHTML = '<div style="text-align:center;color:#777;padding:6px;">Nenhum ponto</div>';
          return;
        }
        this.dom.routePointsList.innerHTML = this.routePoints.map((p, i) =>
          `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:#fff;border:1px solid #e0e0e0;border-radius:4px;margin-bottom:2px;">
            <span style="font-size:0.8rem;">${i+1}. ${p.lat.toFixed(4)}, ${p.lon.toFixed(4)}</span>
            <button class="btn" style="padding:0 6px;color:#e74c3c;border-color:#e74c3c;" onclick="window.atlasApp.removerPontoRota(${i})"><i class="fa-solid fa-xmark"></i></button>
          </div>`
        ).join('');
      }

      async adicionarRota(e) {
        e.preventDefault();
        const nome = this.dom.routeName.value.trim();
        const year = parseInt(this.dom.routeYear.value);
        const desc = this.dom.routeDescription.value.trim();
        if (!nome || isNaN(year) || !desc || this.routePoints.length < 2) {
          alert('Preencha todos os campos e adicione pelo menos 2 pontos.');
          return;
        }

        const nova = {
          nome,
          subtitulo: this.dom.routeSubtitle.value.trim(),
          tipo: 'rota',
          pontos: [...this.routePoints],
          cor: this.dom.routeColor.value,
          descricao: desc,
          fundacao: year,
          pais: this.dom.routeCountries.value.trim() || 'Não especificado',
          continente: this.dom.routeContinents.value.trim() || 'Não especificado',
          categoria: 'rota',
          tema: this.dom.routeCategory.value,
          povo: 'Diversos',
          coverImage: '',
          fotos: [],
          documentos: []
        };

        this.data.push(nova);
        this.salvarDados();
        this.dom.modalAddRoute.classList.remove('open');
        this.dom.addRouteForm.reset();
        this.routePoints = [];
        this.renderizarPontosRota();
        this.inicializarFiltros();
        this.aplicarFiltros();
        alert(`✅ Rota "${nome}" adicionada!`);
      }

      // =========================================================
      // LIGHTBOX / PDF
      // =========================================================
      abrirLightbox(url) {
        const lb = document.getElementById('lightbox');
        if (!lb) {
          const div = document.createElement('div');
          div.id = 'lightbox';
          div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:none;align-items:center;justify-content:center;cursor:pointer;';
          div.innerHTML = `<img id="lb-img" style="max-width:90%;max-height:90%;border-radius:8px;" />`;
          div.onclick = () => div.style.display = 'none';
          document.body.appendChild(div);
          document.getElementById('lb-img').src = url;
          div.style.display = 'flex';
        } else {
          document.getElementById('lb-img').src = url;
          lb.style.display = 'flex';
        }
      }

      abrirPDF(url, titulo) {
        const modal = document.getElementById('pdfModal');
        if (!modal) {
          const div = document.createElement('div');
          div.id = 'pdfModal';
          div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9998;display:none;align-items:center;justify-content:center;';
          div.innerHTML = `
            <div style="background:#fff;border-radius:12px;padding:20px;max-width:800px;width:90%;max-height:90vh;overflow-y:auto;">
              <div style="display:flex;justify-content:space-between;border-bottom:1px solid #e0e0e0;padding-bottom:8px;">
                <h3 id="pdfTitle" style="color:#1a73e8;">Documento</h3>
                <span id="pdfClose" style="cursor:pointer;font-size:1.4rem;">&times;</span>
              </div>
              <iframe id="pdfFrame" style="width:100%;height:480px;border:none;border-radius:6px;margin-top:12px;"></iframe>
            </div>
          `;
          document.body.appendChild(div);
          document.getElementById('pdfClose').onclick = () => {
            div.style.display = 'none';
            document.getElementById('pdfFrame').src = '';
          };
          div.onclick = (e) => { if (e.target === div) { div.style.display = 'none'; document.getElementById('pdfFrame').src = ''; } };
        }
        document.getElementById('pdfTitle').textContent = titulo || 'Documento';
        document.getElementById('pdfFrame').src = url;
        document.getElementById('pdfModal').style.display = 'flex';
      }

      // =========================================================
      // EVENTOS
      // =========================================================
      bindEventos() {
        this.dom.btnToggleFilters.addEventListener('click', () => {
          this.dom.sidebar.classList.toggle('collapsed');
        });

        this.dom.btnToggleTimeline.addEventListener('click', () => {
          this.dom.timelineSection.classList.toggle('collapsed');
        });
        this.dom.timelineClose.addEventListener('click', () => {
          this.dom.timelineSection.classList.add('collapsed');
        });

        document.querySelectorAll('.filter-header').forEach(header => {
          header.addEventListener('click', () => {
            const content = header.nextElementSibling;
            content.style.display = content.style.display === 'none' ? 'flex' : 'none';
          });
        });

        document.addEventListener('click', (e) => {
          const btn = e.target.closest('.filter-btn');
          if (btn) {
            const key = btn.dataset.key;
            const val = btn.dataset.val;
            this.activeFilters[key] = val;
            btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.aplicarFiltros();
          }
        });

        this.dom.btnResetFilters.addEventListener('click', () => {
          this.activeFilters = { categoria: 'todos', tema: 'todos', povo: 'todos' };
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.filter-btn[data-val="todos"]').forEach(b => b.classList.add('active'));
          this.aplicarFiltros();
        });

        const updateAnos = () => {
          this.startYear = parseInt(this.dom.inputStart.value) || -2000;
          this.endYear = parseInt(this.dom.inputEnd.value) || 2026;
          this.aplicarFiltros();
        };
        this.dom.inputStart.addEventListener('change', updateAnos);
        this.dom.inputEnd.addEventListener('change', updateAnos);

        this.dom.search.addEventListener('input', (e) => {
          this.searchQuery = e.target.value.toLowerCase();
          this.aplicarFiltros();
        });

        this.dom.btnCloseDetail.addEventListener('click', () => {
          this.dom.detailPanel.classList.remove('open');
        });

        document.querySelectorAll('.panel-tabs button').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.panel-tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(btn.dataset.tab).classList.add('active');
          });
        });

        this.dom.logoReset.addEventListener('click', (e) => {
          e.preventDefault();
          this.map.flyTo({ center: [-10,10], zoom:2, duration:1500 });
          this.dom.detailPanel.classList.remove('open');
        });

        this.dom.btnAddRoute.addEventListener('click', () => {
          this.dom.modalAddRoute.classList.add('open');
          this.routePoints = [];
          this.renderizarPontosRota();
        });
        this.dom.btnCloseAddRoute.addEventListener('click', () => {
          this.dom.modalAddRoute.classList.remove('open');
        });
        this.dom.addRouteForm.addEventListener('submit', (e) => this.adicionarRota(e));
        this.dom.btnAddRoutePoint.addEventListener('click', () => this.adicionarPontoRota());

        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            this.dom.modalAddRoute.classList.remove('open');
            this.dom.detailPanel.classList.remove('open');
          }
        });
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      window.atlasApp = new AtlasApp();
      window.atlasApp.start();
    });
  </script>
</body>
</html>
